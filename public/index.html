<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>StayVista CRM - Lead Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card .label {
            color: #666;
            margin-top: 5px;
        }
        
        .filters {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .filters h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: #667eea;
            color: white;
        }
        
        .leads-grid {
            display: grid;
            gap: 20px;
        }
        
        .lead-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .lead-card:hover {
            transform: translateY(-5px);
        }
        
        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        
        .lead-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .lead-info .meta {
            color: #666;
            font-size: 0.9em;
        }
        
        .badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .badge-hot {
            background: #ff6b6b;
            color: white;
        }
        
        .badge-cold {
            background: #74b9ff;
            color: white;
        }
        
        .badge-new {
            background: #00b894;
            color: white;
        }
        
        .badge-corporate {
            background: #fdcb6e;
            color: #333;
        }
        
        .lead-body {
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 15px;
        }
        
        .lead-body p {
            color: #555;
            line-height: 1.6;
        }
        
        .lead-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #333;
        }
        
        .btn:hover {
            opacity: 0.8;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }
        
        .empty-state h2 {
            font-size: 2em;
            margin-bottom: 15px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .lead-header {
                flex-direction: column;
            }
            
            .lead-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏡 StayVista CRM</h1>
            <p>Lead Management Dashboard</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="total-leads">0</div>
                <div class="label">Total Leads</div>
            </div>
            <div class="stat-card">
                <div class="number" id="hot-leads">0</div>
                <div class="label">Hot Leads</div>
            </div>
            <div class="stat-card">
                <div class="number" id="new-leads">0</div>
                <div class="label">New Today</div>
            </div>
            <div class="stat-card">
                <div class="number" id="bookings">0</div>
                <div class="label">Bookings</div>
            </div>
        </div>
        
        <div class="filters">
            <h3>Filter Leads</h3>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterLeads('all')">All</button>
                <button class="filter-btn" onclick="filterLeads('hot')">🔥 Hot</button>
                <button class="filter-btn" onclick="filterLeads('cold')">❄️ Cold</button>
                <button class="filter-btn" onclick="filterLeads('new')">🆕 New</button>
                <button class="filter-btn" onclick="filterLeads('corporate')">🏢 Corporate</button>
            </div>
        </div>
        
        <div id="leads-container" class="leads-grid">
            <div class="loading">Loading leads...</div>
        </div>
    </div>
    
    <script>
        let allLeads = [];
        let currentFilter = 'all';
        
        // Load leads from localStorage or API
        async function loadLeads() {
            try {
                // Try API first
                const response = await fetch('https://stayvista-api.kamatanuj.workers.dev/api/bookings');
                if (response.ok) {
                    const data = await response.json();
                    if (data.bookings && data.bookings.length > 0) {
                        allLeads = data.bookings.map(booking => ({
                            id: booking.id,
                            name: booking.guest_name,
                            email: booking.email,
                            phone: booking.phone,
                            villa: booking.villa_name,
                            dates: `${booking.check_in} to ${booking.check_out}`,
                            guests: booking.guests,
                            amount: booking.total,
                            status: 'booked',
                            category: 'hot',
                            created_at: booking.created_at,
                            notes: booking.special_requests || ''
                        }));
                    }
                }
            } catch (e) {
                console.log('API not available, using local data');
            }
            
            // Fallback to demo data if no leads
            if (allLeads.length === 0) {
                allLeads = [
                    {
                        id: 'SV1001',
                        name: 'Anuj Kamat',
                        email: 'anuj@example.com',
                        phone: '98203 70923',
                        villa: 'The Ocean View Estate',
                        dates: '2026-05-20 to 2026-05-23',
                        guests: 4,
                        amount: 148680,
                        status: 'confirmed',
                        category: 'hot',
                        created_at: '2026-05-18T10:00:00Z',
                        notes: 'Celebration booking, wants cake arrangement'
                    },
                    {
                        id: 'CORPABC123',
                        name: 'TechCorp India',
                        email: 'events@techcorp.com',
                        phone: '98765 43210',
                        villa: 'Valley Retreat',
                        dates: '2026-06-15 to 2026-06-17',
                        guests: 25,
                        amount: 0,
                        status: 'enquiry',
                        category: 'corporate',
                        created_at: '2026-05-18T09:30:00Z',
                        notes: 'Corporate retreat, need AV equipment and team building activities'
                    },
                    {
                        id: 'SV1002',
                        name: 'Priya Sharma',
                        email: 'priya@example.com',
                        phone: '97654 32109',
                        villa: 'Casa Bella',
                        dates: '2026-05-25 to 2026-05-28',
                        guests: 6,
                        amount: 135405,
                        status: 'confirmed',
                        category: 'hot',
                        created_at: '2026-05-18T08:15:00Z',
                        notes: 'Family vacation, pet-friendly required'
                    }
                ];
            }
            
            updateStats();
            renderLeads();
        }
        
        function updateStats() {
            document.getElementById('total-leads').textContent = allLeads.length;
            document.getElementById('hot-leads').textContent = allLeads.filter(l => l.category === 'hot').length;
            document.getElementById('new-leads').textContent = allLeads.filter(l => isToday(l.created_at)).length;
            document.getElementById('bookings').textContent = allLeads.filter(l => l.status === 'confirmed' || l.status === 'booked').length;
        }
        
        function isToday(dateString) {
            if (!dateString) return false;
            const date = new Date(dateString);
            const today = new Date();
            return date.toDateString() === today.toDateString();
        }
        
        function filterLeads(category) {
            currentFilter = category;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderLeads();
        }
        
        function renderLeads() {
            const container = document.getElementById('leads-container');
            
            let filtered = allLeads;
            if (currentFilter !== 'all') {
                filtered = allLeads.filter(l => l.category === currentFilter);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>No leads found</h2>
                        <p>Leads will appear here when customers interact with the voice agent.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filtered.map(lead => `
                <div class="lead-card">
                    <div class="lead-header">
                        <div class="lead-info">
                            <h3>${lead.name}</h3>
                            <div class="meta">
                                📞 ${lead.phone} | ✉️ ${lead.email}<br>
                                📅 ${lead.dates} | 👥 ${lead.guests} guests
                            </div>
                        </div>
                        <span class="badge badge-${lead.category}">${lead.category.toUpperCase()}</span>
                    </div>
                    <div class="lead-body">
                        <p>
                            <strong>Villa:</strong> ${lead.villa}<br>
                            <strong>Amount:</strong> ₹${lead.amount.toLocaleString()}<br>
                            <strong>Status:</strong> ${lead.status}<br>
                            ${lead.notes ? `<strong>Notes:</strong> ${lead.notes}` : ''}
                        </p>
                    </div>
                    <div class="lead-actions">
                        <button class="btn btn-primary" onclick="viewLead('${lead.id}')">View Details</button>
                        <button class="btn btn-secondary" onclick="followUp('${lead.id}')">Follow Up</button>
                    </div>
                </div>
            `).join('');
        }
        
        function viewLead(id) {
            const lead = allLeads.find(l => l.id === id);
            if (lead) {
                alert(`Lead Details:\n\nID: ${lead.id}\nName: ${lead.name}\nEmail: ${lead.email}\nPhone: ${lead.phone}\nVilla: ${lead.villa}\nDates: ${lead.dates}\nGuests: ${lead.guests}\nAmount: ₹${lead.amount.toLocaleString()}\nStatus: ${lead.status}\nNotes: ${lead.notes || 'None'}`);
            }
        }
        
        function followUp(id) {
            const lead = allLeads.find(l => l.id === id);
            if (lead) {
                const note = prompt(`Follow up with ${lead.name}:\n\nEnter notes:`);
                if (note) {
                    lead.notes = (lead.notes ? lead.notes + '; ' : '') + note;
                    renderLeads();
                    alert('Follow-up note saved!');
                }
            }
        }
        
        // Load on page load
        loadLeads();
        
        // Refresh every 5 minutes
        setInterval(loadLeads, 5 * 60 * 1000);
    </script>
</body>
</html>
